services:
  - type: web
    name: quantledger-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: quantledger-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: quantledger-redis
          property: connectionString

databases:
  - name: quantledger-db
    databaseName: trading_journal
    user: trading_user
    plan: free

  - name: quantledger-redis
    plan: free
